services:
  elasticsearch:
    image: elasticsearch:9.3.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - 9200:9200
  kibana:
    image: kibana:9.3.1
    container_name: kibana
    ports:
      - 5601:5601
    depends_on:
      - elasticsearch